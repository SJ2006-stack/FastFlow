name: Release slim macOS app

# Builds a low-download FastFlow.app zip (no ASR models) for GitHub Releases.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  slim-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build slim zip
        run: |
          chmod +x scripts/make-slim-release.sh
          ./scripts/make-slim-release.sh release
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastFlow-slim-macos-arm64
          path: dist/FastFlow-slim-macos-arm64.zip

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="$(cat <<EOF
          ## FastFlow slim ($TAG)

          Lightweight menu-bar app **without** speech models (smooth download).

          1. Unzip and open \`FastFlow.app\`
          2. Grant Microphone + Accessibility
          3. Menu → **Download Speech Model…** for Parakeet (~500–600 MB, one-time)

          See [docs/DISTRIBUTION.md](https://github.com/SJ2006-stack/FastFlow/blob/main/docs/DISTRIBUTION.md).
          EOF
          )"
          gh release create "$TAG" dist/FastFlow-slim-macos-arm64.zip \
            --title "FastFlow $TAG (slim)" \
            --notes "$NOTES" \
            --latest \
            || gh release upload "$TAG" dist/FastFlow-slim-macos-arm64.zip --clobber
