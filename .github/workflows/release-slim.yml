name: Release FastFlow.dmg

# Builds a classic Mac installer DMG (drag to Applications) — no ASR models.
# Asset name is FastFlow.dmg so Safari one-click works from:
#   https://github.com/SJ2006-stack/FastFlow/releases/latest/download/FastFlow.dmg
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dmg-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build FastFlow.dmg
        run: |
          chmod +x scripts/make-slim-release.sh
          ./scripts/make-slim-release.sh release
          ls -lh dist/
          test -f dist/FastFlow.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastFlow.dmg
          path: dist/FastFlow.dmg

      - name: Publish GitHub Release with FastFlow.dmg
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="$(cat <<EOF
          ## Download FastFlow for Mac

          **[⬇ Download FastFlow.dmg](https://github.com/SJ2006-stack/FastFlow/releases/download/${TAG}/FastFlow.dmg)** — opens in Safari and downloads like a normal Mac app.

          ### Install (classic Mac vibe)
          1. Open the DMG
          2. Drag **FastFlow** into **Applications**
          3. Open Applications → FastFlow (right-click → **Open** the first time if macOS warns)
          4. Grant **Microphone** + **Accessibility**
          5. Hold **Right Option** to dictate
          6. Optional: menu bar → **Download Speech Model…** (~500–600 MB once)

          This DMG is **slim** (no speech models inside) so the download stays small.
          See [docs/DISTRIBUTION.md](https://github.com/SJ2006-stack/FastFlow/blob/main/docs/DISTRIBUTION.md).
          EOF
          )"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/FastFlow.dmg --clobber
            gh release edit "$TAG" --notes "$NOTES" --title "FastFlow $TAG"
          else
            gh release create "$TAG" dist/FastFlow.dmg \
              --title "FastFlow $TAG" \
              --notes "$NOTES" \
              --latest
          fi
